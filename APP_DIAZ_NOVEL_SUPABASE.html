<style>
  :root {
    --teal: #0f4c5c;
    --teal2: #1a6678;
    --tealLight: #e0f2f7;
    --tealXLight: #f0f9fc;
    --accent: #17a2b8;
    --gold: #c9a84c;
    --goldLight: #fdfcf7;
    --border: #e2e8f0;
    --bg: #f4f7f9;
    --text: #1e293b;
    --muted: #64748b;
    --white: #ffffff;
    --green: #10b981;
    --orange: #f97316;
    --purple: #7c3aed;
    --red: #e11d48;
    --blue: #3b82f6;
    --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; overflow-x: hidden; }

  /* HEADER */
  #header { 
    background: var(--teal); 
    padding: 0 28px; 
    height: 60px; 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    position: sticky; 
    top: 0; 
    z-index: 1000;
    box-shadow: 0 2px 12px rgba(0,0,0,0.18);
  }
  .logo-box { display: flex; align-items: center; gap: 12px; }
  .logo-badge { 
    width: 36px; height: 36px; background: #fff; border-radius: 8px; 
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; color: var(--teal); font-size: 13px; font-family: 'DM Serif Display', serif;
  }
  .logo-text { color: #fff; font-weight: 800; font-size: 15px; letter-spacing: -0.3px; }

  /* NAVIGATION */
  #main { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }
  #tabbar { 
    display: flex; gap: 3px; background: var(--white); border-radius: 11px; 
    padding: 4px; border: 1px solid var(--border); margin-bottom: 18px; 
    overflow-x: auto; scrollbar-width: none;
  }
  .tab-btn { 
    border: none; border-radius: 8px; padding: 7px 11px; font-size: 11px; 
    font-weight: 500; cursor: pointer; background: transparent; color: var(--muted);
    transition: all 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 5px;
  }
  .tab-btn.active { background: var(--teal); color: #fff; font-weight: 700; box-shadow: 0 4px 10px rgba(15,76,92,0.25); }

  /* CONTENT AREA */
  #content { background: var(--white); border-radius: 12px; padding: 22px; border: 1px solid var(--border); min-height: 500px; box-shadow: var(--shadow); }

  /* EXCEL TABLE STYLE */
  .excel-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
  .excel-table th { 
    background: var(--tealXLight); color: var(--teal); padding: 12px 10px; 
    text-align: left; border-bottom: 2px solid var(--tealLight); 
    font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;
    position: sticky; top: 0;
  }
  .excel-table td { padding: 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .excel-table tr:hover { background: #f1f5f9; }
  .price-m2 { color: var(--muted); font-size: 11px; font-style: italic; }
  .overdue { color: var(--red); font-weight: 800; }

  /* BUTTONS */
  .btn-pri { background: var(--teal); color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-weight: 700; cursor: pointer; font-size: 12px; }
  .btn-sec { background: var(--white); color: var(--teal); border: 1px solid #bde0ed; border-radius: 8px; padding: 8px 14px; font-weight: 600; cursor: pointer; font-size: 12px; }
  .btn-sm { border: none; border-radius: 6px; padding: 5px 10px; font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.2s; }
  .btn-blue { background: #eff6ff; color: var(--blue); }
  .btn-green { background: #ecfdf5; color: var(--green); }
  
  /* FORMS */
  .form-box { background: var(--tealXLight); border: 1px solid #bde0ed; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; }
  input, select, textarea { padding: 9px 12px; border-radius: 8px; border: 1px solid var(--border); font-family: inherit; font-size: 13px; }
  textarea { resize: vertical; min-height: 80px; }
  .span-full { grid-column: 1 / -1; }

  /* AUTH MODAL */
  #auth-overlay { position: fixed; inset: 0; background: var(--teal); z-index: 2000; display: flex; align-items: center; justify-content: center; }
  .auth-card { background: #fff; padding: 40px; border-radius: 20px; width: 100%; max-width: 360px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }

  @media (max-width: 768px) {
    .form-grid { grid-template-columns: 1fr; }
    .excel-table th:nth-child(4), .excel-table td:nth-child(4),
    .excel-table th:nth-child(6), .excel-table td:nth-child(6) { display: none; }
  }
</style>
</head>

<div id="auth-overlay">
  <div class="auth-card">
    <div class="logo-badge" style="margin: 0 auto 20px; width: 60px; height: 60px; font-size: 24px;">DN</div>
    <h1 style="color:var(--teal); margin-bottom:8px">Acceso Privado</h1>
    <p style="color:var(--muted); font-size:13px; margin-bottom:25px">Inicia sesión en DíazNovel CRM</p>
    <div style="display:flex; flex-direction:column; gap:12px">

      <input type="password" id="auth-pass" placeholder="Contraseña">
      <button onclick="doLogin()" class="btn-pri" style="padding:12px; font-size:14px; margin-top:10px">Entrar al Sistema</button>
    </div>
  </div>
</div>

<div id="header">
  <div class="logo-box">
    <div class="logo-badge">DN</div>
    <div class="logo-text">DíazNovel <span style="font-weight:300; opacity:0.7">|</span> CRM</div>
  </div>
  <div style="display:flex; gap:10px">
    <button class="btn-sec" style="background:rgba(255,255,255,0.1); color:#fff; border:none" onclick="exportJSON()">Backup</button>
    <button class="btn-sec" style="background:rgba(255,255,255,0.1); color:#fff; border:none" onclick="doLogout()">Salir</button>
  </div>
</div>

<div id="main">
  <div id="tabbar">

  <div id="content"></div>
</div>
